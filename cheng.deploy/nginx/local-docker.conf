events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_host $proxy_host {
        default $http_host;
        ""      "localhost";
    }

    upstream backend_main { server host.docker.internal:8080; }
    upstream backend_auth { server host.docker.internal:8060; }
    upstream backend_msg  { server host.docker.internal:8090; }
    upstream frontend_dev { server host.docker.internal:1024; }

    server {
        listen 80;
        server_name _;

        # 全域上傳大小限制
        client_max_body_size 50m;
        client_body_buffer_size 128k;

        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # ============================================
        # API 代理（後端沒有 context path，全部去掉前綴）
        # ============================================

        # 開發環境 API（前端使用 /dev-api）
        location /dev-api/ {
            proxy_pass http://backend_main/;
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 逾時設定
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
        }

        # 正式環境 API（備用）
        location /prod-api/ {
            proxy_pass http://backend_main/;
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ============================================
        # 靜態檔案
        # ============================================

        location ^~ /profile/ {
            alias /app/uploads/;
            try_files $uri =404;
            add_header Accept-Ranges bytes;
            add_header Access-Control-Allow-Origin * always;
            access_log off;
        }

        # ============================================
        # 其他後端服務
        # ============================================

        # 商城後端 API（ECPay 回調等）
        location /shop/ {
            proxy_pass http://backend_main;
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~* ^/(LineBC|webhook/line|wise|SmartBC|Fubon)/ {
            proxy_pass http://backend_main;
        }

        location /LineSetting {
            proxy_pass http://backend_auth;
        }

        location /MsgAdmin {
            proxy_pass http://backend_msg;
        }

        # SSE (Server-Sent Events)
        location ~* /subscribe {
            proxy_pass http://frontend_dev;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            gzip off;
        }

        # ============================================
        # 前端 SPA（商城 + 後台管理）
        # ============================================

        # Vite HMR WebSocket
        location /__vite_hmr {
            proxy_pass http://frontend_dev;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 後台管理頁面
        location /cadm {
            proxy_pass http://frontend_dev;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 商城頁面（預設）
        location / {
            proxy_pass http://frontend_dev;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
