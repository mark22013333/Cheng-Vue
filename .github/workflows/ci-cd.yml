name: Cheng-Vue CI/CD

on:
  # 只在有程式碼合併/推送到 main 分支時觸發
  push:
    branches:
      - 'main'
      - 'master'
  # 只在 PR 指向 main 或 master 分支時觸發
  pull_request:
    branches:
      - 'main'
      - 'master'
  # 手動觸發，可選擇環境
  workflow_dispatch:
    inputs:
      environment:
        description: '部署環境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: cheng-vue-deploy-${{ github.ref }}-${{ inputs.environment || 'production' }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  JAVA_VERSION: '25'
  PYTHON_VERSION: '3.9'
  # 根據觸發方式決定環境：手動觸發用 input，push 到 main 用 production
  DEPLOY_ENV: ${{ github.event.inputs.environment || 'production' }}

jobs:
  validate-mappers:
    name: Validate MyBatis Mappers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify All Mappers (全專案)
        run: |
          echo "🔍 驗證全專案所有模組的 Mapper 實作..."
          python3 cheng.deploy/verify-all-mappers.py
          if [ $? -eq 0 ]; then
            echo "✅ 全專案 Mapper 驗證通過"
          else
            echo "❌ Mapper 驗證失敗，請檢查上述錯誤"
            exit 1
          fi

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        working-directory: cheng-ui
        run: pnpm install

      - name: Build frontend (統一 SPA)
        working-directory: cheng-ui
        env:
          BUILD_ENV: ${{ env.DEPLOY_ENV }}
        run: |
          echo "🌍 建置環境: $BUILD_ENV"
          if [ "$BUILD_ENV" = "staging" ]; then
            echo "🏪 建置前端 (Staging)..."
            pnpm run build:stage
          else
            echo "🏪 建置前端 (Production)..."
            pnpm run build:prod
          fi
          echo "📋 複製到 dist-admin（統一 SPA，兩個目錄使用相同檔案）"
          cp -r dist dist-admin

      - name: Verify build output
        run: |
          echo "🔍 驗證前端建置..."
          if [ ! -d "cheng-ui/dist" ]; then
            echo "❌ Error: Build failed - dist directory not found"
            exit 1
          fi
          if [ ! -f "cheng-ui/dist/index.html" ]; then
            echo "❌ Error: Build failed - index.html not found"
            exit 1
          fi
          echo "✅ Frontend build verification passed"
          ls -la cheng-ui/dist/
          ls -la cheng-ui/dist-admin/

      - name: Upload shop frontend artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-shop-dist
          path: cheng-ui/dist/

      - name: Upload admin frontend artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-admin-dist
          path: cheng-ui/dist-admin/

  build-backend:
    name: Build Backend (Maven)
    needs: validate-mappers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Java ${{ env.JAVA_VERSION }} and Maven
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Build all modules (Maven install)
        run: mvn -B -DskipTests clean install

      - name: Build backend WAR (Maven package)
        working-directory: cheng-admin
        run: mvn -B -DskipTests package

      - name: Upload backend artifact
        uses: actions/upload-artifact@v5
        with:
          name: backend-wars
          path: cheng-admin/target/apps.war

  deploy:
    name: Deploy (${{ github.event.inputs.environment || 'production' }})
    needs: [ build-frontend, build-backend ]
    runs-on: ubuntu-latest
    # push 到 main 自動部署 production，或手動觸發時部署選定的環境
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download shop frontend artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend-shop-dist
          path: cheng.deploy/frontend-shop-dist

      - name: Download admin frontend artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend-admin-dist
          path: cheng.deploy/frontend-admin-dist

      - name: Download backend artifact
        uses: actions/download-artifact@v5
        with:
          name: backend-wars
          path: backend-wars


      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Manage known_hosts (secret or ssh-keyscan)
        env:
          KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          SERVER_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -e
          mkdir -p ~/.ssh
          if [ -n "$KNOWN_HOSTS" ]; then
            echo "$KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            SERVER_PORT=${SERVER_PORT:-22}
            ssh-keyscan -p "$SERVER_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          fi

      - name: Deploy backend WAR to server (script)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          TOMCAT_WEBAPPS_DIR: ${{ secrets.TOMCAT_WEBAPPS_DIR }}
          APP_NAME: apps
          WAR_FILE: backend-wars/apps.war
          HEALTH_PROTOCOL: https
          # staging 用 /stage-api，production 用 /prod-api
          HEALTH_PATH: ${{ env.DEPLOY_ENV == 'staging' && '/stage-api/system/user/profile' || '/prod-api/system/user/profile' }}
        run: bash cheng.deploy/deploy-backend.sh

      - name: Deploy shop frontend (商城)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          LOCAL_FRONTEND_DIR: cheng.deploy/frontend-shop-dist
          FRONTEND_DIR: /var/www/cheng-vue/frontend
          APP_TYPE: 商城前端
        run: bash cheng.deploy/deploy-to-server.sh

      - name: Deploy admin frontend (後台管理)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          LOCAL_FRONTEND_DIR: cheng.deploy/frontend-admin-dist
          FRONTEND_DIR: /var/www/cheng-vue/frontend/cadm
          SKIP_NGINX_CONFIG: "true"
          APP_TYPE: 後台管理前端
        run: bash cheng.deploy/deploy-to-server.sh
